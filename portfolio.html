<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Coming Soon | Alvansga's Space</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .coming-soon-container {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            max-width: 600px;
            width: 90%;
            animation: zoomIn 0.8s ease-out;
        }

        .back-home {
            margin-top: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s;
        }

        .back-home:hover {
            transform: translateX(-5px);
        }

        .loader-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 2rem 0;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(0.5);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="coming-soon-container">
        <header>
            <i class="fas fa-tools" style="font-size: 4rem; color: var(--primary); margin-bottom: 2rem;"></i>
            <h1>Portfolio</h1>
            <p class="subtitle">Coming Soon</p>
        </header>

        <p style="color: var(--text-muted); line-height: 1.6;">
            Sedang dalam tahap pengerjaan. Saya sedang merapikan koleksi proyek terbaik saya untuk ditampilkan di sini.
            Stay tuned!
        </p>

        <div class="loader-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <a href="index.html" class="back-home">
            <i class="fas fa-arrow-left"></i> Kembali ke Beranda
        </a>
    </div>

    <footer style="position: absolute; bottom: 2rem; color: var(--text-muted); font-size: 0.8rem;">
        &copy; 2026 Alvansga. Built with Passion.
    </footer>
</body>

</html>
